name: 每日自動更新食規資料

on:
  schedule:
    # 每天台灣時間 09:00 執行（UTC 01:00）
    - cron: "0 1 * * *"
  workflow_dispatch: {}   # 也可以手動點按鈕觸發

permissions:
  contents: write   # 需要 write 才能 commit 更新後的 JSON

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 執行爬蟲
        working-directory: scripts
        run: |
          python build_data.py

      - name: 檢查是否有變動並 commit
        run: |
          git config user.name "food-reg-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/items.json
          if git diff --staged --quiet; then
            echo "本次無新資料"
          else
            git commit -m "chore: 自動更新食規資料 $(date -u +'%Y-%m-%d')"
            git push
          fi
