name: 自動編譯 Tailwind 樣式

# 只要影響樣式的檔案被推上 main，就自動重新編譯 assets/app.css 並 commit 回來。
# 這樣就不必手動跑編譯指令，也不會發生「改了 class 卻忘了重編」的問題。
on:
  push:
    branches: [main]
    paths:
      - "index.html"
      - "tailwind.config.js"
      - "assets/tailwind-input.css"
      - ".github/workflows/build-css.yml"
  workflow_dispatch: {}

permissions:
  contents: write

# 同一時間只跑一個，避免重複觸發互相打架
concurrency:
  group: build-css
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 下載 Tailwind 獨立版 CLI (v3.4.17)
        run: |
          curl -sL -o tailwindcss \
            https://github.com/tailwindlabs/tailwindcss/releases/download/v3.4.17/tailwindcss-linux-x64
          chmod +x tailwindcss

      - name: 編譯 app.css
        run: |
          ./tailwindcss -c tailwind.config.js \
            -i assets/tailwind-input.css \
            -o assets/app.css --minify

      - name: 若有變動則 commit
        run: |
          git config user.name "food-reg-bot"
          git config user.email "bot@users.noreply.github.com"
          git add assets/app.css
          if git diff --staged --quiet; then
            echo "app.css 無變動，跳過"
          else
            git commit -m "build: 自動重新編譯 app.css"
            git push
          fi
