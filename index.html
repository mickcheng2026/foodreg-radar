  <!-- Toast 提示 -->

       bg-slate-900 text-white text-sm px-4 py-2.5 rounded-lg shadow-lg max-w-xs text-center"></div>

  <script>
    // ============================================================
    // 食規雷達 前端邏輯
    // ============================================================
    const SOURCE_STYLES = {
      "食藥署":   { color: "emerald", text: "text-emerald-700", bg: "bg-emerald-50",  border: "border-emerald-200",  accent: "text-emerald-500" },
      "食藥署法規":{ color: "amber",   text: "text-amber-700",   bg: "bg-amber-50",    border: "border-amber-200",    accent: "text-amber-500" },
      "HACCP":   { color: "amber",   text: "text-amber-700",   bg: "bg-amber-50",    border: "border-amber-200",    accent: "text-amber-500" },
      "ISO 標準":{ color: "indigo",  text: "text-indigo-700",  bg: "bg-indigo-50",   border: "border-indigo-200",   accent: "text-indigo-500" },
      "US FDA":  { color: "blue",    text: "text-blue-700",    bg: "bg-blue-50",     border: "border-blue-200",     accent: "text-blue-500" },
      "EFSA":    { color: "purple",  text: "text-purple-700",  bg: "bg-purple-50",   border: "border-purple-200",   accent: "text-purple-500" },
      "Codex":   { color: "rose",    text: "text-rose-700",    bg: "bg-rose-50",     border: "border-rose-200",     accent: "text-rose-500" },
      "香港 CFS":{ color: "cyan",    text: "text-cyan-700",    bg: "bg-cyan-50",     border: "border-cyan-200",     accent: "text-cyan-500" },
      "澳洲 FSANZ":{color: "amber",   text: "text-amber-700",   bg: "bg-amber-50",    border: "border-amber-200",    accent: "text-amber-500" },
      "日本 FSC":{ color: "rose",    text: "text-rose-700",    bg: "bg-rose-50",     border: "border-rose-200",     accent: "text-rose-500" },
      "馬來西亞 KKM":{color:"yellow",text: "text-yellow-700",  bg: "bg-yellow-50",   border: "border-yellow-200",   accent: "text-yellow-500" },
      "進出口規範":{color: "slate",  text: "text-slate-700",   bg: "bg-slate-100",   border: "border-slate-300",    accent: "text-slate-500" },
      "HACCP 認證":{color: "lime",   text: "text-lime-700",    bg: "bg-lime-50",     border: "border-lime-200",     accent: "text-lime-500" },
      "日本 法規目錄":{color:"rose", text: "text-rose-700",    bg: "bg-rose-50",     border: "border-rose-200",     accent: "text-rose-500" },
      "出口指南":{color: "indigo", text: "text-indigo-700",  bg: "bg-indigo-50",   border: "border-indigo-200",   accent: "text-indigo-500" },
      "食安事件":{color: "red",    text: "text-red-700",     bg: "bg-red-50",      border: "border-red-200",      accent: "text-red-500" },
    };

    // 跨來源「食安事件」分類：聚合各國回收/警報來源，且限近一年
    const INCIDENT_KEY = "__incident__";
    // 聚合「各國食安事件」：全球食安新聞 + 澳洲/香港回收警報。
    // 不含 US FDA（其 openFDA 為每年逾千筆例行回收，會淹沒各國平衡；美國重大事件已由 Food Safety News 涵蓋）。
    const INCIDENT_LABELS = new Set(["食安事件", "澳洲 FSANZ", "香港 CFS"]);
    function isIncidentItem(i) {
      if (!INCIDENT_LABELS.has(i.source_label)) return false;
      const ds = i.date || (i.fetched_at ? i.fetched_at.slice(0, 10) : "");
      if (!ds) return false;
      const d = new Date(ds);
      return !isNaN(d) && d >= new Date(Date.now() - 365 * 86400000);
    }

    // 國家樣式（按鈕顏色）
    const COUNTRY_STYLES = {
      "台灣":     { emoji: "🇹🇼", bg: "bg-emerald-50",  text: "text-emerald-700", border: "border-emerald-200" },
      "美國":     { emoji: "🇺🇸", bg: "bg-blue-50",     text: "text-blue-700",    border: "border-blue-200" },
      "歐盟":     { emoji: "🇪🇺", bg: "bg-purple-50",   text: "text-purple-700",  border: "border-purple-200" },
      "香港":     { emoji: "🇭🇰", bg: "bg-cyan-50",     text: "text-cyan-700",    border: "border-cyan-200" },
      "日本":     { emoji: "🇯🇵", bg: "bg-rose-50",     text: "text-rose-700",    border: "border-rose-200" },
      "澳洲":     { emoji: "🇦🇺", bg: "bg-amber-50",    text: "text-amber-700",   border: "border-amber-200" },
      "馬來西亞":  { emoji: "🇲🇾", bg: "bg-yellow-50",   text: "text-yellow-700",  border: "border-yellow-200" },
      "英國":     { emoji: "🇬🇧", bg: "bg-indigo-50",   text: "text-indigo-700",  border: "border-indigo-200" },
      "加拿大":    { emoji: "🇨🇦", bg: "bg-red-50",      text: "text-red-700",     border: "border-red-200" },
      "亞洲其他":  { emoji: "🌏", bg: "bg-teal-50",     text: "text-teal-700",    border: "border-teal-200" },
      "國際":     { emoji: "🌐", bg: "bg-slate-50",    text: "text-slate-700",   border: "border-slate-200" },
      [INCIDENT_KEY]: { emoji: "⚠️", bg: "bg-red-50",  text: "text-red-700",     border: "border-red-300" },
    };
    // 國家順序（呈現順序）+ 哪些已經有資料、哪些是占位
    const COUNTRY_ORDER = ["台灣", "美國", "歐盟", "香港", "日本", "澳洲", "馬來西亞", "英國", "加拿大", "亞洲其他", "國際"];

    const TAG_HIGHLIGHT = {
      "預告":   { bg: "bg-red-50",    text: "text-red-700",    border: "border-red-200" },
      "修正":   { bg: "bg-orange-50", text: "text-orange-700", border: "border-orange-200" },
      "HACCP":  { bg: "bg-amber-50",  text: "text-amber-700",  border: "border-amber-200" },
      "召回":   { bg: "bg-red-50",    text: "text-red-700",    border: "border-red-200" },
    };

    let DATA = null;
    let CURRENT_COUNTRY = "all";
    let CURRENT_SOURCE = "all";
    let CURRENT_QUERY = "";
    let CURRENT_RANGE = "all";   // 時間範圍篩選（all=不限）
    let PAGE_SIZE = 20;
    let DISPLAY_COUNT = PAGE_SIZE;

    // 時間範圍選項（依發布日期；無發布日期者用收錄日期）
    const RANGE_OPTIONS = [
      { key: "all", label: "全部時間", days: null },
      { key: "7",   label: "近 7 天",  days: 7 },
      { key: "30",  label: "近 30 天", days: 30 },
      { key: "90",  label: "近 90 天", days: 90 },
      { key: "365", label: "近一年",   days: 365 },
    ];

    // 載入 items.json
    fetch("data/items.json", { cache: "no-cache" })
      .then(r => r.ok ? r.json() : Promise.reject(r.status))
      .then(d => { DATA = d; applyUrlState(); render(); })
      .catch(err => {
        document.getElementById("feed").innerHTML =
          `<div class="text-center py-12">
             <p class="text-slate-600 mb-2">無法載入資料</p>
             <p class="text-xs text-slate-400">${err}。請在已部署到網路的網站上開啟（直接開檔可能有跨檔限制）。</p>
           </div>`;
      });

    function render() {
      renderStats();
      renderChips();
      renderFeed();
      attachInteractions();
    }

    function renderStats() {
      const stats = DATA.stats || { total: 0, by_source: {} };
      const updated = DATA.updated_at || "";
      document.getElementById("last-updated").textContent =
        "最後更新：" + (updated.replace("T", " ").slice(0, 16) || "—");

      const sevenDaysAgo = new Date(Date.now() - 7*86400000);
      const thirtyDaysAgo = new Date(Date.now() - 30*86400000);

      let weekCount = 0, monthCount = 0;
      for (const it of DATA.items || []) {
        if (!it.date) continue;
        const d = new Date(it.date);
        if (d >= sevenDaysAgo) weekCount++;
        if (d >= thirtyDaysAgo) monthCount++;
      }

      const sources = Object.keys(stats.by_source || {}).length;
      const cards = [
        { label: "本週新增", value: weekCount,   color: "text-emerald-600" },
        { label: "近 30 日", value: monthCount,  color: "text-slate-900" },
        { label: "資料來源", value: sources,     color: "text-slate-900" },
        { label: "總收錄",   value: stats.total, color: "text-slate-900" },
      ];

      document.getElementById("stats-grid").innerHTML = cards.map(c => `
        <div class="bg-white rounded-xl p-4 shadow-sm border border-slate-100">
          <div class="text-xs text-slate-500 mb-1">${c.label}</div>
          <div class="text-2xl font-bold ${c.color}">${c.value}</div>
        </div>
      `).join("");
    }

    function getCountryStats() {
      const stats = {};
      for (const it of DATA.items || []) {
        const c = it.country || "未分類";
        stats[c] = (stats[c] || 0) + 1;
      }
      return stats;
    }

    function getSourceStatsForCountry(country) {
      const stats = {};
      for (const it of DATA.items || []) {
        if (country === INCIDENT_KEY) {
          if (!isIncidentItem(it)) continue;
        } else if (country !== "all" && it.country !== country) {
          continue;
        }
        const s = it.source_label;
        stats[s] = (stats[s] || 0) + 1;
      }
      return stats;
    }

    function renderCountryChips() {
      const stats = getCountryStats();
      const allCount = (DATA.items || []).length;
      const chips = [{ key: "all", label: "全部", count: allCount, isAll: true }];

      // 跨來源「食安事件」分類（近一年各國回收/警報/事件）
      const incidentCount = (DATA.items || []).filter(isIncidentItem).length;
      if (incidentCount) {
        chips.push({ key: INCIDENT_KEY, label: "食安事件", count: incidentCount });
      }

      // 有資料的國家依 COUNTRY_ORDER 順序
      for (const c of COUNTRY_ORDER) {
        if (stats[c]) {
          chips.push({ key: c, label: c, count: stats[c] });
        }
      }
      // 占位（無資料的）— 顯示但 disabled
      for (const c of COUNTRY_ORDER) {
        if (!stats[c]) {
          chips.push({ key: c, label: c, count: 0, placeholder: true });
        }
      }

      document.getElementById("country-chips").innerHTML = chips.map(c => {
        const cs = COUNTRY_STYLES[c.key] || { emoji: "📍", bg: "bg-slate-50", text: "text-slate-700", border: "border-slate-200" };
        let cls;
        if (c.isAll) {
          cls = "bg-slate-900 text-white";
        } else if (c.placeholder) {
          cls = "bg-slate-50 text-slate-300 border border-dashed border-slate-200 cursor-not-allowed";
        } else {
          cls = `${cs.bg} ${cs.text} border ${cs.border} hover:opacity-80`;
        }
        const cnt = c.placeholder
          ? ` <span class="ml-1 text-[10px] italic">即將推出</span>`
          : ` <span class="ml-1 opacity-60">${c.count}</span>`;
        if (!c.placeholder && ((c.isAll && CURRENT_COUNTRY === "all") || c.key === CURRENT_COUNTRY)) cls += " chip-active";
        const disabled = c.placeholder ? "disabled" : "";
        const emoji = c.isAll ? "📍" : (cs.emoji || "");
        return `<button data-country="${c.key}" ${disabled}
                  class="country-chip px-3 py-1.5 rounded-full text-xs font-medium transition ${cls}">
                  ${emoji} ${c.label}${cnt}
                </button>`;
      }).join("");
    }

    function renderSourceChips() {
      const stats = getSourceStatsForCountry(CURRENT_COUNTRY);
      const sources = Object.keys(stats);
      const totalCount = sources.reduce((sum, s) => sum + stats[s], 0);
      const chips = [{ key: "all", label: "全部來源", count: totalCount }]
        .concat(sources.map(s => ({ key: s, label: s, count: stats[s] })));

      document.getElementById("source-chips").innerHTML = chips.map(c => {
        const style = c.key === "all" ? null : SOURCE_STYLES[c.key];
        let cls = c.key === "all"
          ? "bg-slate-900 text-white"
          : `${style?.bg || "bg-slate-50"} ${style?.text || "text-slate-700"} border ${style?.border || "border-slate-200"} hover:opacity-80`;
        if ((c.key === "all" && CURRENT_SOURCE === "all") || c.key === CURRENT_SOURCE) cls += " chip-active";
        const countText = ` <span class="ml-1 opacity-60">${c.count}</span>`;
        return `<button data-source="${c.key}"
                  class="source-chip px-3 py-1.5 rounded-full text-xs font-medium transition ${cls}">
                  ${c.label}${countText}
                </button>`;
      }).join("");
    }

    function renderRangeChips() {
      const html = RANGE_OPTIONS.map(o => {
        const active = o.key === CURRENT_RANGE;
        const cls = active
          ? "bg-slate-900 text-white"
          : "bg-slate-50 text-slate-700 border border-slate-200 hover:opacity-80";
        return `<button data-range="${o.key}"
                  class="range-chip px-3 py-1.5 rounded-full text-xs font-medium transition ${cls}">
                  ${o.label}
                </button>`;
      }).join("");
      document.getElementById("range-chips").innerHTML = html;
    }

    function renderChips() {
      renderRangeChips();
      renderCountryChips();
      renderSourceChips();
    }

    // 跳到官網搜尋（用 Google site: 比官網內部搜尋穩定）
    const EXTERNAL_SEARCH = [
      { label: "食藥署官網", site: "fda.gov.tw",          color: "bg-emerald-50 text-emerald-700 border-emerald-200 hover:bg-emerald-100" },
      { label: "US FDA",    site: "fda.gov",              color: "bg-blue-50 text-blue-700 border-blue-200 hover:bg-blue-100" },
      { label: "EFSA",      site: "efsa.europa.eu",       color: "bg-purple-50 text-purple-700 border-purple-200 hover:bg-purple-100" },
      { label: "Codex",     site: "fao.org/fao-who-codexalimentarius", color: "bg-rose-50 text-rose-700 border-rose-200 hover:bg-rose-100" },
      { label: "ISO",       site: "iso.org",              color: "bg-indigo-50 text-indigo-700 border-indigo-200 hover:bg-indigo-100" },
    ];
    function externalSearchUrl(site, query) {
      const q = encodeURIComponent(`site:${site} ${query}`);
      return `https://www.google.com/search?q=${q}`;
    }
    function renderExternalSearchButtons(query, layout) {
      const sizeCls = layout === "big"
        ? "px-4 py-2.5 text-sm"
        : "px-2.5 py-1 text-xs";
      return EXTERNAL_SEARCH.map(s =>
        `<a href="${externalSearchUrl(s.site, query)}" target="_blank" rel="noopener"
            class="inline-flex items-center gap-1 rounded-md border font-medium transition ${s.color} ${sizeCls}">
            ${escapeHtml(s.label)}
            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"/></svg>
         </a>`
      ).join("");
    }

    function renderFeed() {
      syncUrl();
      const items = filterItems();
      const slice = items.slice(0, DISPLAY_COUNT);
      const hasQuery = CURRENT_QUERY.length > 0;

      const isFiltered = CURRENT_QUERY || CURRENT_SOURCE !== "all" || CURRENT_COUNTRY !== "all" || CURRENT_RANGE !== "all";
      document.getElementById("result-count").innerHTML =
        `共 ${items.length} 筆${isFiltered
          ? ` · <button onclick="clearFilters()" class="text-emerald-600 hover:underline font-medium">清除篩選</button>`
          : ""}`;

      if (items.length === 0) {
        const emptyBody = hasQuery
          ? `<div class="text-center py-12">
              <svg class="w-12 h-12 mx-auto text-slate-300 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 21l-4.35-4.35M11 19a8 8 0 100-16 8 8 0 000 16z"/></svg>
              <p class="text-slate-700 font-medium mb-1">本站沒有符合「${escapeHtml(CURRENT_QUERY)}」的資料</p>
              <p class="text-xs text-slate-500 mb-6">可能是該公告在抓取範圍之外（本站只收最新列表），試試到官網全文搜尋：</p>
              <div class="flex flex-wrap justify-center gap-2 max-w-xl mx-auto">
                ${renderExternalSearchButtons(CURRENT_QUERY, "big")}
              </div>
              <button onclick="clearFilters()" class="mt-6 text-xs text-slate-400 hover:text-slate-600 hover:underline">清除搜尋</button>
             </div>`
          : `<div class="text-center py-16 text-slate-400">
              <p>沒有符合條件的資料</p>
              <button onclick="clearFilters()" class="mt-3 text-xs text-emerald-600 hover:underline">清除篩選</button>
             </div>`;
        document.getElementById("feed").innerHTML = emptyBody;
        document.getElementById("load-more-wrap").classList.add("hidden");
        return;
      }

      // 有結果但又有搜尋字 → 上方加個小提示橫條
      const banner = hasQuery
        ? `<div class="bg-amber-50 border border-amber-200 rounded-lg p-3 mb-4 text-xs flex flex-col sm:flex-row sm:items-center gap-2">
             <div class="flex-1 text-amber-800">
               <span class="font-semibold">本站找到 ${items.length} 筆</span> · 想找更舊或更詳細的？
             </div>
             <div class="flex flex-wrap gap-1.5">
               ${renderExternalSearchButtons(CURRENT_QUERY, "small")}
             </div>
           </div>`
        : "";

      document.getElementById("feed").innerHTML = banner + slice.map(renderCard).join("");
      const moreBtn = document.getElementById("load-more-wrap");
      if (items.length > DISPLAY_COUNT) moreBtn.classList.remove("hidden");
      else moreBtn.classList.add("hidden");
    }

    function isNewItem(item) {
      const ds = item.date || (item.first_seen ? item.first_seen.slice(0, 10) : "");
      if (!ds) return false;
      const d = new Date(ds);
      return !isNaN(d) && d >= new Date(Date.now() - 7 * 86400000);
    }

    function renderCard(item) {
      const style = SOURCE_STYLES[item.source_label] || SOURCE_STYLES["食藥署"];
      const dateStr = item.date || (item.fetched_at ? item.fetched_at.slice(0, 10) : "");
      const dateLabel = item.date ? "發布" : "收錄";
      const newBadge = isNewItem(item)
        ? `<span class="px-2 py-1 rounded-md text-xs font-bold bg-red-500 text-white">新</span>`
        : "";
      const tags = (item.tags || [])
        .filter(t => t !== item.source_label)
        .slice(0, 4)
        .map(t => {
          const h = TAG_HIGHLIGHT[t];
          const cls = h ? `${h.bg} ${h.text} border ${h.border}` : "bg-slate-100 text-slate-600 hover:bg-slate-200";
          return `<button data-tag="${escapeAttr(t)}" title="篩選「${escapeAttr(t)}」" class="px-2 py-1 rounded-md text-xs font-medium ${cls} transition cursor-pointer">${escapeHtml(t)}</button>`;
        }).join("");

      const aiBullets = Array.isArray(item.ai_summary) ? item.ai_summary : null;
      const aiBlock = aiBullets ? `
        <div class="bg-emerald-50/60 border border-emerald-100 rounded-lg p-4 mb-3">
          <div class="text-xs font-semibold text-emerald-700 mb-2 flex items-center gap-1.5">
            <svg class="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 20 20">
              <path d="M5 2a1 1 0 011 1v1h1a1 1 0 010 2H6v1a1 1 0 01-2 0V6H3a1 1 0 010-2h1V3a1 1 0 011-1zm0 10a1 1 0 011 1v1h1a1 1 0 110 2H6v1a1 1 0 11-2 0v-1H3a1 1 0 110-2h1v-1a1 1 0 011-1zM12 2a1 1 0 01.967.744L14.146 7.2 17.5 9.134a1 1 0 010 1.732l-3.354 1.935-1.18 4.455a1 1 0 01-1.933 0L9.854 12.8 6.5 10.866a1 1 0 010-1.732l3.354-1.935 1.18-4.455A1 1 0 0112 2z"/>
            </svg>
            AI 重點
          </div>
          <ul class="space-y-1.5 text-sm text-slate-700">
            ${aiBullets.map(b => `<li class="flex gap-2"><span class="${style.accent} font-bold shrink-0">·</span><span>${escapeHtml(b)}</span></li>`).join("")}
          </ul>
        </div>` : "";

      const rawSummary = item.summary ? `
        <details class="${aiBullets ? 'mt-1' : ''} mb-4">
          <summary class="text-xs text-slate-500 cursor-pointer hover:text-slate-700 select-none">
            ${aiBullets ? '展開原文摘要' : '原文摘要'}
          </summary>
          <p class="text-sm text-slate-600 mt-2 pl-3 border-l-2 border-slate-200 line-clamp-4">${escapeHtml(item.summary)}</p>
        </details>` : "";

      const summary = aiBlock + rawSummary;

      return `
        <article class="card-hover bg-white rounded-2xl border border-slate-200 p-6 shadow-sm fade-in">
          <div class="flex items-start justify-between gap-4 mb-3">
            <div class="flex items-center gap-2 flex-wrap">
              ${newBadge}
              <span class="px-2.5 py-1 rounded-md ${style.bg} ${style.text} text-xs font-semibold border ${style.border}">${escapeHtml(item.source_label)}</span>
              ${tags}
            </div>
            <div class="text-right shrink-0">
              <div class="text-sm font-semibold text-slate-900">${dateStr || "—"}</div>
              <div class="text-xs text-slate-500">${dateLabel}</div>
            </div>
          </div>

          ${item.title_zh ? `
          <h3 class="text-lg font-bold text-slate-900 mb-1 leading-snug">
            ${escapeHtml(item.title_zh)}
          </h3>
          <p class="text-sm text-slate-500 italic mb-3 leading-snug">
            ${escapeHtml(item.title || "")}
          </p>` : `
          <h3 class="text-lg font-bold text-slate-900 mb-3 leading-snug">
            ${escapeHtml(item.title || "")}
          </h3>`}

          ${summary}

          <div class="flex items-center justify-between gap-3 flex-wrap">
            <div class="flex items-center gap-2">
              <button data-copy-url="${escapeAttr(item.url)}"
                 class="copy-btn inline-flex items-center gap-1 text-xs font-medium px-2.5 py-1.5 rounded-lg bg-slate-100 text-slate-600 hover:bg-slate-200 transition">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
                複製重點
              </button>
              <button data-share-url="${escapeAttr(item.url)}"
                 class="share-btn inline-flex items-center gap-1 text-xs font-medium px-2.5 py-1.5 rounded-lg bg-slate-100 text-slate-600 hover:bg-slate-200 transition">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"/></svg>
                分享
              </button>
            </div>
            <a href="${escapeAttr(item.url)}" target="_blank" rel="noopener"
               class="inline-flex items-center gap-1 text-sm ${style.text} hover:opacity-80 font-medium">
              查看原文
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"/></svg>
            </a>
          </div>
        </article>
      `;
    }

    function filterItems() {
      let arr = DATA.items || [];
      if (CURRENT_RANGE !== "all") {
        const opt = RANGE_OPTIONS.find(o => o.key === CURRENT_RANGE);
        if (opt && opt.days) {
          const cutoff = new Date(Date.now() - opt.days * 86400000);
          arr = arr.filter(i => {
            const ds = i.date || (i.fetched_at ? i.fetched_at.slice(0, 10) : "");
            if (!ds) return false;
            const d = new Date(ds);
            return !isNaN(d) && d >= cutoff;
          });
        }
      }
      if (CURRENT_COUNTRY === INCIDENT_KEY) {
        arr = arr.filter(isIncidentItem);
      } else if (CURRENT_COUNTRY !== "all") {
        arr = arr.filter(i => i.country === CURRENT_COUNTRY);
      }
      if (CURRENT_SOURCE !== "all") {
        arr = arr.filter(i => i.source_label === CURRENT_SOURCE);
      }
      if (CURRENT_QUERY) {
        const q = CURRENT_QUERY.toLowerCase();
        arr = arr.filter(i => {
          const aiText = Array.isArray(i.ai_summary) ? i.ai_summary.join(" ") : "";
          const blob = ((i.title || "") + " " + (i.title_zh || "") + " " + (i.summary || "") + " " + aiText + " " + (i.tags || []).join(" ")).toLowerCase();
          return blob.includes(q);
        });
      }
      return arr;
    }

    function attachSourceChipHandlers() {
      document.querySelectorAll(".source-chip").forEach(btn => {
        btn.addEventListener("click", () => {
          CURRENT_SOURCE = btn.dataset.source;
          DISPLAY_COUNT = PAGE_SIZE;
          document.querySelectorAll(".source-chip").forEach(b => b.classList.remove("chip-active"));
          btn.classList.add("chip-active");
          renderFeed();
        });
      });
    }

    function attachInteractions() {
      // 時間範圍 chip（事件委派綁在容器上：chip 會被重畫，綁按鈕本身會失效）
      document.getElementById("range-chips").addEventListener("click", e => {
        const btn = e.target.closest(".range-chip");
        if (!btn) return;
        CURRENT_RANGE = btn.dataset.range;
        DISPLAY_COUNT = PAGE_SIZE;
        renderRangeChips();
        renderFeed();
      });

      // 國家 chip
      document.querySelectorAll(".country-chip:not([disabled])").forEach(btn => {
        btn.addEventListener("click", () => {
          CURRENT_COUNTRY = btn.dataset.country;
          CURRENT_SOURCE = "all";
          DISPLAY_COUNT = PAGE_SIZE;
          document.querySelectorAll(".country-chip").forEach(b => b.classList.remove("chip-active"));
          btn.classList.add("chip-active");
          renderSourceChips();
          attachSourceChipHandlers();
          renderFeed();
        });
      });
      attachSourceChipHandlers();

      const search = document.getElementById("search-input");
      let timer = null;
      search.addEventListener("input", e => {
        clearTimeout(timer);
        timer = setTimeout(() => {
          CURRENT_QUERY = e.target.value.trim();
          DISPLAY_COUNT = PAGE_SIZE;
          renderFeed();
        }, 150);
      });

      document.getElementById("load-more").addEventListener("click", () => {
        DISPLAY_COUNT += PAGE_SIZE;
        renderFeed();
      });

      // 卡片內的複製/分享/標籤（事件委派：卡片會重畫，綁固定的 feed 容器）
      document.getElementById("feed").addEventListener("click", e => {
        const copyBtn = e.target.closest(".copy-btn");
        if (copyBtn) { copyHighlights(copyBtn.dataset.copyUrl); return; }
        const shareBtn = e.target.closest(".share-btn");
        if (shareBtn) { shareItem(shareBtn.dataset.shareUrl); return; }
        const tagBtn = e.target.closest("[data-tag]");
        if (tagBtn) {
          search.value = tagBtn.dataset.tag;
          CURRENT_QUERY = tagBtn.dataset.tag;
          DISPLAY_COUNT = PAGE_SIZE;
          renderFeed();
          window.scrollTo({ top: 0, behavior: "smooth" });
          return;
        }
      });

      // 回到頂部
      const backTop = document.getElementById("back-to-top");
      window.addEventListener("scroll", () => {
        backTop.classList.toggle("hidden", window.scrollY < 600);
        backTop.classList.toggle("flex", window.scrollY >= 600);
      });
      backTop.addEventListener("click", () => window.scrollTo({ top: 0, behavior: "smooth" }));

      // 鍵盤快捷：「/」聚焦搜尋、Esc 清空
      document.addEventListener("keydown", e => {
        if (e.key === "/" && document.activeElement !== search) {
          e.preventDefault(); search.focus();
        } else if (e.key === "Escape" && document.activeElement === search) {
          search.value = ""; CURRENT_QUERY = ""; DISPLAY_COUNT = PAGE_SIZE; renderFeed(); search.blur();
        }
      });

      // 深色模式切換
      applyThemeIcons();
      document.getElementById("theme-toggle").addEventListener("click", () => {
        const dark = document.documentElement.classList.toggle("dark");
        try { localStorage.setItem("theme", dark ? "dark" : "light"); } catch (e) {}
        applyThemeIcons();
      });

      // 手機篩選收合
      document.getElementById("filter-toggle").addEventListener("click", () => {
        const body = document.getElementById("filter-body");
        const nowHidden = body.classList.toggle("hidden");
        document.getElementById("filter-caret").style.transform = nowHidden ? "" : "rotate(180deg)";
      });

      // 匯出 CSV
      document.getElementById("export-btn").addEventListener("click", exportCsv);
    }

    function clearFilters() {
      CURRENT_COUNTRY = "all";
      CURRENT_SOURCE = "all";
      CURRENT_QUERY = "";
      CURRENT_RANGE = "all";
      renderRangeChips();
      document.getElementById("search-input").value = "";
      document.querySelectorAll(".country-chip").forEach(b => b.classList.remove("chip-active"));
      document.querySelectorAll(".source-chip").forEach(b => b.classList.remove("chip-active"));
      const countryAll = document.querySelector('.country-chip[data-country="all"]');
      const sourceAll = document.querySelector('.source-chip[data-source="all"]');
      if (countryAll) countryAll.classList.add("chip-active");
      if (sourceAll) sourceAll.classList.add("chip-active");
      renderSourceChips();
      attachSourceChipHandlers();
      renderFeed();
    }

    // ── 可分享的篩選網址（把篩選狀態存進網址 #） ──
    function syncUrl() {
      const p = new URLSearchParams();
      if (CURRENT_QUERY) p.set("q", CURRENT_QUERY);
      if (CURRENT_COUNTRY !== "all") p.set("country", CURRENT_COUNTRY);
      if (CURRENT_SOURCE !== "all") p.set("source", CURRENT_SOURCE);
      if (CURRENT_RANGE !== "all") p.set("range", CURRENT_RANGE);
      const s = p.toString();
      try { history.replaceState(null, "", s ? "#" + s : location.pathname); } catch (e) {}
    }
    function applyUrlState() {
      const h = (location.hash || "").replace(/^#/, "");
      if (!h) return;
      const p = new URLSearchParams(h);
      if (p.get("q")) { CURRENT_QUERY = p.get("q"); const s = document.getElementById("search-input"); if (s) s.value = CURRENT_QUERY; }
      if (p.get("country")) CURRENT_COUNTRY = p.get("country");
      if (p.get("source")) CURRENT_SOURCE = p.get("source");
      if (p.get("range")) CURRENT_RANGE = p.get("range");
    }

    // ── 匯出目前篩選結果為 CSV（Excel 可開）──
    function exportCsv() {
      const items = filterItems();
      if (!items.length) { toast("目前沒有可匯出的資料"); return; }
      const head = ["來源", "國家/地區", "標題", "原文標題", "發布日期", "AI 重點", "連結"];
      const esc = v => `"${String(v ?? "").replace(/"/g, '""')}"`;
      const rows = items.map(i => [
        i.source_label, i.country || "",
        i.title_zh || i.title || "", i.title_zh ? (i.title || "") : "",
        i.date || "", Array.isArray(i.ai_summary) ? i.ai_summary.join(" / ") : "", i.url,
      ]);
      const csv = "﻿" + [head, ...rows].map(r => r.map(esc).join(",")).join("\r\n");
      const blob = new Blob([csv], { type: "text/csv;charset=utf-8" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = `食規雷達_${new Date().toISOString().slice(0, 10)}.csv`;
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      URL.revokeObjectURL(a.href);
      toast(`已匯出 ${items.length} 筆 CSV 📄`);
    }

    // ── 深色模式圖示切換 ──
    function applyThemeIcons() {
      const dark = document.documentElement.classList.contains("dark");
      const m = document.getElementById("icon-moon"), s = document.getElementById("icon-sun");
      if (m) m.classList.toggle("hidden", dark);
      if (s) s.classList.toggle("hidden", !dark);
    }

    // ── Toast 提示 ──
    let TOAST_TIMER = null;
    function toast(msg) {
      const el = document.getElementById("toast");
      el.textContent = msg;
      el.classList.remove("hidden");
      clearTimeout(TOAST_TIMER);
      TOAST_TIMER = setTimeout(() => el.classList.add("hidden"), 2500);
    }

    async function copyText(text) {
      try {
        await navigator.clipboard.writeText(text);
        return true;
      } catch (e) {
        // 後備：textarea + execCommand
        try {
          const ta = document.createElement("textarea");
          ta.value = text; ta.style.position = "fixed"; ta.style.opacity = "0";
          document.body.appendChild(ta); ta.select();
          const ok = document.execCommand("copy");
          document.body.removeChild(ta);
          return ok;
        } catch (e2) { return false; }
      }
    }

    // ── 複製重點：標題 + AI 重點 + 連結，方便貼進報告 ──
    async function copyHighlights(url) {
      const item = (DATA.items || []).find(i => i.url === url);
      if (!item) return;
      const title = item.title_zh || item.title || "";
      const bullets = Array.isArray(item.ai_summary) ? item.ai_summary : [];
      const lines = [
        `【${item.source_label}】${title}`,
        item.date ? `日期：${item.date}` : "",
        ...bullets.map(b => `・${b}`),
        `原文：${item.url}`,
      ].filter(Boolean);
      const ok = await copyText(lines.join("\n"));
      toast(ok ? "已複製重點，可直接貼上 📋" : "複製失敗，請手動選取");
    }

    // ── 分享單則：手機用系統分享，桌機複製連結 ──
    async function shareItem(url) {
      const item = (DATA.items || []).find(i => i.url === url);
      if (!item) return;
      const title = `【食規雷達】${item.title_zh || item.title || ""}`;
      if (navigator.share) {
        try { await navigator.share({ title, url: item.url }); return; }
        catch (e) { if (e && e.name === "AbortError") return; }
      }
      const ok = await copyText(`${title}\n${item.url}`);
      toast(ok ? "已複製連結，可貼給同事 🔗" : "複製失敗，請手動複製網址");
    }

    function escapeHtml(s) {
      return String(s ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }
    function escapeAttr(s) { return escapeHtml(s); }
  </script>

</body>
